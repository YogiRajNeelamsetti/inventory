services:
  - type: web
    name: kirana-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_MAX_POOL_SIZE
        value: "2"
      - key: DB_MIN_IDLE
        value: "0"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: FLYWAY_CONNECT_RETRIES
        value: "20"
      - key: JWT_SECRET
        sync: false
      - key: ML_SERVICE_URL
        value: http://127.0.0.1:8000
      - key: ENABLE_ML_SERVICE
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ML_ALLOWED_ORIGINS
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: JAVA_MAX_RAM_PERCENTAGE
        value: "30.0"
      - key: JAVA_INITIAL_RAM_PERCENTAGE
        value: "10.0"
      - key: JAVA_MAX_METASPACE_MB
        value: "128"
      - key: JAVA_RESERVED_CODE_CACHE_MB
        value: "64"
      - key: JAVA_THREAD_STACK_KB
        value: "512"
      - key: DB_POOL_SIZE
        value: "1"
      - key: DB_MAX_OVERFLOW
        value: "0"
