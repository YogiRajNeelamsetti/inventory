server:
  port: ${PORT:${SERVER_PORT:5000}}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    


  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  demo:
    enabled: ${DEMO_MODE_ENABLED:false}
    email: ${DEMO_EMAIL:}

  auth:
    rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:15}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
    lockout:
      enabled: ${AUTH_LOCKOUT_ENABLED:true}
      max-failed-attempts: ${AUTH_LOCKOUT_MAX_FAILED_ATTEMPTS:5}
      duration-minutes: ${AUTH_LOCKOUT_DURATION_MINUTES:15}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kirana: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.flywaydb: INFO

