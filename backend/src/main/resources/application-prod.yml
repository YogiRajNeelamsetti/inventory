spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:240000}

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/prod
    connect-retries: ${FLYWAY_CONNECT_RETRIES:20}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  demo:
    enabled: false

  auth:
    rate-limit:
      enabled: true
    lockout:
      enabled: true

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kirana: INFO
    org.springframework.security: WARN


ml:
  service:
    url: ${ML_SERVICE_URL:http://127.0.0.1:8000}
