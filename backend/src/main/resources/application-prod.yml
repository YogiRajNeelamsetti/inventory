spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  demo:
    enabled: false

  auth:
    rate-limit:
      enabled: true
    lockout:
      enabled: true

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kirana: INFO
    org.springframework.security: WARN


ml:
  service:
    url: ${ML_SERVICE_URL:http://127.0.0.1:8000}
